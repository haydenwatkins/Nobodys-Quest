<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Nobody's Quest">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <title>Nobody's Quest</title>
  <link rel="stylesheet" href="css/style.css?v=20260718a">
</head>
<body>
  <div id="game-wrap">
    <canvas id="game" width="320" height="180"></canvas>
  </div>
  <!-- Text & HUD render on this full-resolution layer so words stay
       razor-sharp while the game world below stays chunky-pixel. -->
  <canvas id="ui"></canvas>

  <!-- Touch controls (only visible on touch devices) -->
  <div id="touch-ui">
    <div id="joy-zone"></div>
    <div id="btn-zone">
      <button class="abtn" id="btn-swap">⇄</button>
      <button class="abtn big" id="btn-a">A</button>
      <button class="abtn" id="btn-b">B</button>
      <button class="abtn" id="btn-c">C</button>
    </div>
    <button id="btn-pause">☰</button>
  </div>

  <!-- Pause menu / form workshop overlays are built by ui.js -->
  <div id="menu" class="hidden"></div>
  <div id="workshop-errors" class="hidden"></div>

  <!-- ENGINE (Ben: you don't need to touch these!) -->
  <script src="js/engine/core.js?v=20260717i"></script>
  <script src="js/engine/audio.js?v=20260715c"></script>
  <script src="js/engine/sprites.js?v=20260720d"></script>
  <script src="js/engine/input.js?v=20260720e"></script>
  <script src="js/engine/world.js?v=20260720g"></script>
  <script src="js/engine/combat.js?v=20260720a"></script>
  <script src="js/engine/entities.js?v=20260720f"></script>
  <script src="js/engine/forms.js?v=20260717i"></script>
  <script src="js/engine/quests.js?v=20260712c"></script>
  <script src="js/engine/save.js?v=20260720g"></script>
  <script src="js/engine/ui.js?v=20260720b"></script>
  <script src="js/engine/tutorial.js?v=20260718a"></script>
  <script src="js/engine/town.js?v=20260716b"></script>

  <!-- ABILITIES (the shared toybox of moves) -->
  <script src="js/abilities/basics.js?v=20260719b"></script>

  <!-- FORMS (Ben: THIS is where you add new classes! Copy rat.js to start.) -->
  <script src="js/forms/nobody.js?v=20260717i"></script>
  <script src="js/forms/rat.js?v=20260717i"></script>
  <script src="js/forms/knight.js?v=20260717i"></script>
  <script src="js/forms/ranger.js?v=20260717i"></script>
  <script src="js/forms/wizard.js?v=20260717i"></script>
  <script src="js/forms/frog.js?v=20260717i"></script>
  <script src="js/forms/alchemist.js?v=20260717i"></script>
  <script src="js/forms/stormcaller.js?v=20260717i"></script>
  <script src="js/forms/dragon.js?v=20260717i"></script>
  <script src="js/forms/riftblade.js?v=20260717i"></script>
  <script src="js/forms/mole.js?v=20260717i"></script>
  <script src="js/forms/vampire.js?v=20260717i"></script>
  <script src="js/forms/jester.js?v=20260717i"></script>
  <script src="js/forms/turtle.js?v=20260717i"></script>
  <script src="js/forms/samurai.js?v=20260717i"></script>
  <script src="js/forms/astronomer.js?v=20260717i"></script>
  <script src="js/forms/druid.js?v=20260717i"></script>
  <script src="js/forms/griffin.js?v=20260719a"></script>
  <script src="js/forms/golem.js?v=20260719a"></script>
  <script src="js/forms/weaver.js?v=20260719a"></script>
  <script src="js/forms/bellkeeper.js?v=20260719a"></script>
  <script src="js/forms/lantern-wisp.js?v=20260719a"></script>
  <script src="js/forms/colossus.js?v=20260719a"></script>
  <script src="js/forms/god.js?v=20260717i"></script>
  <script src="js/engine/passives.js?v=20260719b"></script>

  <!-- WORLD DATA (enemies and maps — also editable!) -->
  <script src="js/data/enemies.js?v=20260720d"></script>
  <script src="js/data/npcs.js?v=20260720g"></script>
  <script src="js/data/maps.js?v=20260720g"></script>
  <script src="js/engine/gauntlet.js?v=20260716c"></script>
  <script src="js/engine/endgame.js?v=20260716b"></script>
  <script src="js/engine/wayfinder.js?v=20260719b"></script>
  <script src="js/engine/costumes.js?v=20260719b"></script>
  <script src="js/engine/worldwake.js?v=20260719b"></script>
  <script src="js/engine/npcs.js?v=20260720g"></script>

  <!-- BOOT (must be last) -->
  <script src="js/engine/main.js?v=20260720g"></script>
</body>
</html>
